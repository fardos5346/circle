<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קסם העיגול והמעגל</title>
    <style>
        :root {
            --primary: #4a6fa5;
            --secondary: #166088;
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --text: #2b2d42;
            --success: #2ec4b6;
            --error: #e71d36;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .lang-switcher {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .lang-btn {
            background-color: white;
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .lang-btn.active, .lang-btn:hover {
            background-color: var(--primary);
            color: white;
        }

        .content-section {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .rtl {
            direction: rtl;
            text-align: right;
        }

        .ltr {
            direction: ltr;
            text-align: left;
        }

        h2 {
            color: var(--secondary);
            border-bottom: 2px solid var(--bg);
            padding-bottom: 10px;
        }

        .formula-box {
            background-color: #f7f9fc;
            border-left: 5px solid var(--primary);
            padding: 15px;
            margin: 15px 0;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 4px;
        }
        
        .rtl .formula-box {
            border-left: none;
            border-right: 5px solid var(--primary);
        }

        .quiz-container {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .question-card {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .question-card.advanced {
            border-left: 5px solid #ff9f1c;
        }
        .rtl .question-card.advanced {
            border-left: none;
            border-right: 5px solid #ff9f1c;
        }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            font-size: 0.8rem;
            background: #ff9f1c;
            color: white;
            border-radius: 4px;
            margin-bottom: 5px;
        }

        input[type="text"] {
            width: 140px;
            padding: 6px;
            border: 2px solid #ccc;
            border-radius: 4px;
            margin: 5px;
            font-size: 1rem;
        }

        input[type="text"]:disabled {
            background-color: #e9ecef;
            color: #495057;
            cursor: not-allowed;
        }

        button.action-btn {
            background-color: var(--secondary);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }

        button.action-btn:hover:not(:disabled) {
            background-color: var(--primary);
        }

        button.action-btn:disabled {
            background-color: #ced4da;
            cursor: not-allowed;
        }

        .feedback-box {
            margin-top: 10px;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.95rem;
            display: none;
        }

        .feedback-box.correct {
            display: block;
            background-color: #e8f8f5;
            color: #117a65;
            border: 1px solid #a3e4d7;
        }

        .feedback-box.incorrect {
            display: block;
            background-color: #fdebd0;
            color: #b03a2e;
            border: 1px solid #f5cba7;
        }

        #score-summary {
            margin-top: 25px;
            padding: 20px;
            background: #eef1f6;
            border-radius: 8px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-switcher">
        <button class="lang-btn" id="btn-en" onclick="switchLang('en')">English</button>
        <button class="lang-btn" id="btn-he" onclick="switchLang('he')">עברית</button>
        <button class="lang-btn" id="btn-ar" onclick="switchLang('ar')">العربية</button>
        <button class="lang-btn" id="btn-ru" onclick="switchLang('ru')">Русский</button>
    </div>

    <header>
        <h1 id="main-title">קסם העיגול והמעגל</h1>
        <p id="main-subtitle">מגלים את הסודות של העולם העגול!</p>
    </header>

    <div id="content-area"></div>

    <div class="quiz-container">
        <h2 id="quiz-title">בחן את הידע שלך!</h2>
        <p id="quiz-intro">אין צורך במחשבונים! ברגע שתבדקו את התשובה השאלה תינעל, אז חשבו היטב!</p>
        
        <div id="quiz-questions"></div>

        <button class="action-btn" id="btn-check-all" onclick="checkAll()">Check All Questions</button>
        <div id="score-summary"></div>
    </div>
</div>

        document.body.className = lData.dir;

        document.getElementById('main-subtitle').innerText = lData.subtitle;
        document.getElementById('quiz-title').innerText = lData.quizTitle;
        document.getElementById('quiz-intro').innerText = lData.quizIntro;
        document.getElementById('btn-check-all').innerText = lData.checkAllBtn;
        document.getElementById('score-summary').innerText = '';

        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
        const targetBtn = document.getElementById(`btn-${lang}`);
        if(targetBtn) targetBtn.classList.add('active');

        let htmlContent = `
            <div class="content-section">
                <h2>${lData.historyTitle}</h2>
                <p>${lData.historyBody}</p>

                <div class="formula-box">${lData.formCirc}</div>
                <div class="formula-box">${lData.formArea}</div>
            </div>
        `;
        document.getElementById('content-area').innerHTML = htmlContent;

        let quizHtml = '';
        lData.questions.forEach((q, index) => {
            let badge = q.type === 'advanced' ? `<span class="badge">${lData.advBadge}</span><br>` : '';
            let advClass = q.type === 'advanced' ? 'advanced' : '';
            quizHtml += `
                <div class="question-card ${advClass}">
                    ${badge}
                    <strong>${index + 1}. ${q.q}</strong>
                    <br>
                    <input type="text" id="q-${index}" placeholder="...">
                    <button class="action-btn" id="btn-single-${index}" style="padding:4px 10px; font-size:0.85rem;" onclick="checkSingle(${index})">${lData.checkBtn}</button>

        const singleBtn = document.getElementById(`btn-single-${index}`);
        
        if (!inputEl || inputEl.disabled) return inputEl ? inputEl.dataset.wasCorrect === 'true' : false;

        const userAnswer = inputEl.value.trim().toLowerCase().replace(/\s+/g, '');
        const questionObj = data[currentLang].questions[index];
        const primaryAns = questionObj.a.toLowerCase().replace(/\s+/g, '');

        let isCorrect = (userAnswer === primaryAns);
        
        if (!silent) {
            // Lock inputs instantly so student cannot fix it after checking
            inputEl.disabled = true;
            if(singleBtn) singleBtn.disabled = true;

            if (isCorrect) {
                feedbackEl.innerText = data[currentLang].correctPrefix + questionObj.exp;
                feedbackEl.className = "feedback-box correct";
            } else {
                feedbackEl.innerText = data[currentLang].incorrectPrefix + questionObj.exp;
                feedbackEl.className = "feedback-box incorrect";
            }
        }
        
        inputEl.dataset.wasCorrect = isCorrect ? 'true' : 'false';
        return isCorrect;
    }

    function checkAll() {
        let correctCount = 0;
        const total = data[currentLang].questions.length;
        
        for (let i = 0; i < total; i++) {
            let isCorrect = checkSingle(i, false);
            if (isCorrect) correctCount++;
        }

        let percentage = Math.round((correctCount / total) * 100);
        let appreciation = "";
        
        // Dynamically adjust appreciation message to avoid saying "great job" on very low scores
        if (percentage >= 85) {
            appreciation = data[currentLang].highScoreFeedback;
        } else if (percentage >= 40) {
            appreciation = data[currentLang].midScoreFeedback;
        } else {
            appreciation = data[currentLang].lowScoreFeedback;
        }
        
        document.getElementById('score-summary').innerText = `${data[currentLang].scoreMsg} ${correctCount} / ${total} (${percentage}%) - ${appreciation}`;
        document.getElementById('btn-check-all').disabled = true;
    }

    // Force initialization with Hebrew as default
    window.onload = function() {
        switchLang('he');
    };
</script>

</body>
</html>
